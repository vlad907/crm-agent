services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@db:5432/crm_db}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      GMAIL_OAUTH_REDIRECT_URI: ${GMAIL_OAUTH_REDIRECT_URI:-http://localhost:8000/api/v1/integrations/gmail/callback}
      GMAIL_OAUTH_SCOPES: ${GMAIL_OAUTH_SCOPES:-https://www.googleapis.com/auth/gmail.compose https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/gmail.modify}
      OAUTH_STATE_SIGNING_SECRET: ${OAUTH_STATE_SIGNING_SECRET:-dev-oauth-state-secret}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3080}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      DEFAULT_WORKSPACE_ID: ${DEFAULT_WORKSPACE_ID:-}
      DEFAULT_USER_ID: ${DEFAULT_USER_ID:-}
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Browser uses same-origin /api/v1 → Next proxy; target must be the backend service from inside this container.
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-}
      CRM_API_PROXY_TARGET: ${CRM_API_PROXY_TARGET:-http://backend:8000}
      CRM_API_URL: ${CRM_API_URL:-http://backend:8000}
    ports:
      # Use a high host port to avoid clashing with local Next/Electron on 3000–3010.
      - "${FRONTEND_HOST_PORT:-3080}:3000"

volumes:
  postgres_data:
